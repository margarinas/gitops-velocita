---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: article-service
  namespace: flux-system
spec:
  image: ghcr.io/nerijus-lgtm/article_service
  interval: 5m0s
  secretRef:
    name: ghcr-docker-pull
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: article-service
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: article-service
  filterTags:
    pattern: '^sha-[a-fA-F0-9]+-(?P<ts>.*)'
    extract: '$ts'
  policy:
    numerical:
      order: desc
  digestReflectionPolicy: Always
  interval: 5m0s
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: article-service
  namespace: flux-system
spec:
  interval: 5m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: master
    commit:
      author:
        email: fluxcdbot@users.noreply.github.com
        name: fluxcdbot
      messageTemplate: '{{range .Changed.Changes}}{{print .OldValue}} -> {{println .NewValue}}{{end}}'
    push:
      branch: master
  update:
    path: ./apps/article-service
    strategy: Setters
