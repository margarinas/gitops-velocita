---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: default
spec:
  interval: 60m
  releaseName: forgejo
  chart:
    spec:
      chart: forgejo
      version: "17.0.0"
      sourceRef:
        kind: HelmRepository
        name: forgejo
      interval: 10m
  values:
    postgresql:
      enabled: false
    postgresql-ha:
      enabled: false
    valkey:
      enabled: false
    valkey-cluster:
      enabled: false

    persistence:
      enabled: true
      storageClass: "local-path"
      size: 20Gi

    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
      hosts:
        - host: git.motorsniper.lt
          paths:
            - path: /
              pathType: Prefix
              port: http
      tls:
        - secretName: tls-forgejo
          hosts:
            - git.motorsniper.lt

    gitea:
      config:
        APP_NAME: "Forgejo"
        actions:
          ENABLED: true
          DEFAULT_ACTIONS_URL: https://data.forgejo.org
        cache:
          ADAPTER: redis
          HOST: redis://dragonfly.default:6379/0
        database:
          DB_TYPE: mysql
          HOST: pxc-db-haproxy.default:3306
          NAME: forgejo-db
          USER: forgejo-db-user
          SSL_MODE: disable
        queue:
          TYPE: redis
          CONN_STR: redis://dragonfly.default:6379/0
        server:
          DOMAIN: git.motorsniper.lt
          ROOT_URL: https://git.motorsniper.lt/
          SSH_DOMAIN: git.motorsniper.lt
        service:
          DISABLE_REGISTRATION: true
          ALLOW_ONLY_EXTERNAL_REGISTRATION: false
          SHOW_REGISTRATION_BUTTON: false
        session:
          PROVIDER: redis
          PROVIDER_CONFIG: redis://dragonfly.default:6379/0
      additionalConfigFromEnvs:
        - name: FORGEJO__DATABASE__PASSWD
          valueFrom:
            secretKeyRef:
              name: forgejo-credentials
              key: DB_PASSWORD
