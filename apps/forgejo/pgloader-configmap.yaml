apiVersion: v1
kind: ConfigMap
metadata:
  name: forgejo-pgloader
  namespace: default
data:
  forgejo.load: |
    LOAD DATABASE
         FROM mysql://forgejo-db-user@pxc-db-haproxy.default:3306/forgejo-db?useSSL=false
         INTO postgresql://forgejo-db-user@postgres-rw.default:5432/forgejo-db

     WITH include drop, create tables, create indexes, reset sequences,
          foreign keys, downcase identifiers, uniquify index names,
          workers = 4, concurrency = 1

      SET PostgreSQL PARAMETERS
          maintenance_work_mem to '128MB',
          work_mem to '16MB'

      SET MySQL PARAMETERS
          net_read_timeout = '120',
          net_write_timeout = '120'

     ALTER TABLE NAMES MATCHING ~/./ SET SCHEMA 'public'

     BEFORE LOAD DO
       $$ create schema if not exists public; $$,
       $$ alter schema public owner to "forgejo-db-user"; $$

     AFTER LOAD DO
       $$ analyze; $$;
