---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: article-service
  namespace: default
  labels:
    app.kubernetes.io/name: article-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: article-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: article-service
    spec:
      imagePullSecrets:
        - name: ghcr-docker-pull
      containers:
        - name: article-service
          image: "ghcr.io/nerijus-lgtm/article_service:sha-4359b6b"
          imagePullPolicy: Always
          
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          
          resources:
            requests:
              cpu: 200m
              memory: 200Mi
      

