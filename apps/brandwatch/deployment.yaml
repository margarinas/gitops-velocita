---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: brandwatch
  namespace: default
  labels:
    app.kubernetes.io/name: brandwatch

spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: brandwatch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: brandwatch
    spec:
      imagePullSecrets:
        - name: regcred

      containers:
        - name: brandwatch
          image: "margarinas/brandwatch:latest"
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: brandwatch
            - secretRef:
                name: brandwatch
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
