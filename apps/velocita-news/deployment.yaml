---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: velocita-news
  namespace: default
  labels:
    app.kubernetes.io/name: velocita-news

spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: velocita-news
  template:
    metadata:
      labels:
        app.kubernetes.io/name: velocita-news
    spec:
      imagePullSecrets:
        - name: regcred

      containers:
        - name: velocita-news
          image: "margarinas/velocita-news:latest"
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: velocita-news
            - secretRef:
                name: velocita-news
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
