---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: velocita-news
  namespace: default
  labels:
    app.kubernetes.io/name: velocita-news
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - "news.velocita.lt"
      secretName: tls-velocita-news
  rules:
    - host: "news.velocita.lt"
      http:
        paths:
          - path: "/"
            pathType: "Prefix"
            backend:
              service:
                name: velocita-news
                port:
                  number: 8080
